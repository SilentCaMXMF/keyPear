version: "3.8"

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keypear-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      STORAGE_PATH: /app/storage/user-files
      THUMBNAIL_DIR: /app/storage/thumbnails
      CHUNK_TEMP_DIR: /app/storage/chunks
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - sqlite_data:/app/data
      - user_files:/app/storage/user-files
      - thumbnails:/app/storage/thumbnails
      - chunk_temp:/app/storage/chunks
    networks:
      - keypear-network
    ports:
      - "3002:3002"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: keypear-frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - backend
    networks:
      - keypear-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: keypear-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - keypear-network

  # Prometheus (Optional Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: keypear-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    profiles:
      - monitoring
    networks:
      - keypear-network

  # Grafana (Optional Monitoring)
  grafana:
    image: grafana/grafana:latest
    container_name: keypear-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring
    networks:
      - keypear-network

volumes:
  sqlite_data:
  user_files:
  thumbnails:
  chunk_temp:
  prometheus_data:
  grafana_data:

networks:
  keypear-network:
    driver: bridge
