version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: keypear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keypear
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: keypear
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keypear"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keypear-network

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: keypear-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-keypear}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-change-me-in-production}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - keypear-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keypear-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://keypear:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/keypear
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      STORAGE_PATH: /app/storage/user-files
      THUMBNAIL_DIR: /app/storage/thumbnails
      CHUNK_TEMP_DIR: /app/storage/chunks
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4321}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-keypear}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-change-me-in-production}
      MINIO_BUCKET: keypear-files
    volumes:
      - user_files:/app/storage/user-files
      - thumbnails:/app/storage/thumbnails
      - chunk_temp:/app/storage/chunks
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - keypear-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: keypear-frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - backend
    networks:
      - keypear-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: keypear-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - keypear-network

  # Prometheus (Optional Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: keypear-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    profiles:
      - monitoring
    networks:
      - keypear-network

  # Grafana (Optional Monitoring)
  grafana:
    image: grafana/grafana:latest
    container_name: keypear-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring
    networks:
      - keypear-network

volumes:
  postgres_data:
  minio_data:
  user_files:
  thumbnails:
  chunk_temp:
  prometheus_data:
  grafana_data:

networks:
  keypear-network:
    driver: bridge
